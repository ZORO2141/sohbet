<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZORO Sohbet</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* Genel tasarım */
body{
  background:#121212;
  color:white;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h2{
  padding:20px;
  margin:0;
  background:#1f1f1f;
  width:100%;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.5);
}

/* Chat kutusu */
#chat{
  width:90%;
  max-width:700px;
  height:450px;
  margin:20px auto;
  background:#1b1b1b;
  border-radius:12px;
  overflow-y:auto;
  padding:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  text-align:left;
}
.mesaj{
  margin:10px 0;
  padding:10px;
  background:#2a2a2a;
  border-radius:10px;
  word-wrap:break-word;
  position:relative;
}
.mesaj b{
  color:#4da6ff;
}
.mesaj img{
  max-width:200px;
  border-radius:10px;
  margin-top:5px;
  display:block;
}

/* Giriş/Kayıt alanı */
#loginContainer{
  margin-top:40px;
  background:#1f1f1f;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
#loginContainer input{
  width:80%;
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
}
#loginContainer button{
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4da6ff;
  color:white;
  transition:0.2s;
}
#loginContainer button:hover{
  background:#3399ff;
}

/* Mesaj gönderme alanı */
#messageContainer{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
}
#messageContainer input[type="text"]{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
}
#messageContainer input[type="file"]{
  border-radius:8px;
}
#messageContainer button{
  background:#4da6ff;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
#messageContainer button:hover{
  background:#3399ff;
}

/* Sil butonu */
.silBtn{ 
  background:#aa3333; 
  color:white; 
  margin-left:8px; 
  display:none; 
  position:absolute; 
  right:5px; 
  top:5px; 
  cursor:pointer;
}
.mesaj:hover .silBtn { display:inline-block; }
a{color:#4da6ff; word-break: break-all;}
</style>
</head>

<body>

<h2>ZORO Sohbet</h2>

<!-- Giriş / Kayıt alanı -->
<div id="loginContainer">
  <input type="text" id="usernameInput" placeholder="Kullanıcı adı">
  <input type="password" id="passwordInput" placeholder="Şifre">
  <div style="display:flex; gap:10px;">
    <button id="loginBtn">Giriş Yap</button>
    <button id="registerBtn">Kayıt Ol</button>
  </div>
</div>

<!-- Chat alanı -->
<div id="chat" style="display:none;"></div>

<div id="messageContainer" style="display:none;">
  <input type="text" id="mesaj" placeholder="Mesaj yaz">
  <input type="file" id="dosya">
  <button class="gonderBtn" id="gonderBtn">Gönder</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://pqplprtztvamamzidyqa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGxwcnR6dHZhbWFtemlkeXFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODg5NjAsImV4cCI6MjA4ODI2NDk2MH0.FZD-uGWZsEMqvl7lOktzUAjAtULUDtw6d2Gbuewx5i8";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });

let isim, sifre, chat, input, dosyaInput;
let sonMesajId = 0;

// Giriş ve Kayıt butonları
document.getElementById("registerBtn").addEventListener("click", async () => {
  const inputName = document.getElementById("usernameInput").value.trim();
  const inputPass = document.getElementById("passwordInput").value;

  if(!inputName || !inputPass){
    alert("Kullanıcı adı ve şifre boş olamaz!");
    return;
  }

  // Kullanıcı zaten var mı kontrol et
  const { data: existing, error: checkError } = await client.from("kullanicilar").select("*").eq("isim", inputName);
  if(existing && existing.length > 0){
    alert("Bu kullanıcı adı zaten kayıtlı!");
    return;
  }

  // Kayıt ekle
  await client.from("kullanicilar").insert([{ isim: inputName, sifre: inputPass }]);
  alert("Kayıt başarılı! Artık giriş yapabilirsiniz.");
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const inputName = document.getElementById("usernameInput").value.trim();
  const inputPass = document.getElementById("passwordInput").value;

  const { data: users, error } = await client.from("kullanicilar").select("*").eq("isim", inputName).eq("sifre", inputPass);

  if(!users || users.length === 0){
    alert("Kullanıcı adı veya şifre yanlış!");
    return;
  }

  isim = inputName;
  sifre = inputPass;

  document.getElementById("loginContainer").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("messageContainer").style.display = "flex";

  initChat();
});

function initChat(){
  chat = document.getElementById("chat");
  input = document.getElementById("mesaj");
  dosyaInput = document.getElementById("dosya");
  const gonderBtn = document.getElementById("gonderBtn");

  input.addEventListener("keypress", e => { if(e.key==="Enter") gonderMesaj(); });
  gonderBtn.addEventListener("click", gonderMesaj);

  mesajlariYukle();
  setInterval(mesajlariYukle, 2000);
}

// Mesaj gönderme
async function gonderMesaj() {
  let mesaj = input.value.trim();
  input.value = "";

  let tur = "text";

  if(dosyaInput.files.length > 0) {
    const file = dosyaInput.files[0];
    dosyaInput.value = "";
    const fileName = `${Date.now()}_${file.name.replace(/\s/g,"_")}`;

    const { data: uploadData, error: uploadError } = await client
      .storage
      .from('chat-files')
      .upload(fileName, file, { cacheControl:'3600', upsert:true });

    if(uploadError){ console.log(uploadError); return; }

    const { data: urlData } = client
      .storage
      .from('chat-files')
      .getPublicUrl(fileName);

    mesaj = urlData.publicUrl;
    tur = "image";
  }

  if(!mesaj) return;

  try {
    await client.from("mesajlar").insert([{ isim, sifre, mesaj, tur }]);
  } catch(err) { console.log(err); }
}

// Mesajları yükleme
async function mesajlariYukle() {
  const { data, error } = await client.from("mesajlar").select("*").order("id",{ascending:true});
  if(error){ console.log(error); return; }

  let yeniMesajlar = data.filter(m => m.id > sonMesajId);
  yeniMesajlar.forEach(m=>{
    const div = document.createElement("div");
    div.className = "mesaj";
    let html = `<b>${m.isim}:</b> `;
    if(m.tur === "image") html += `<img src='${m.mesaj}'>`;
    else html += m.mesaj;

    div.innerHTML = html;

    if(m.isim === isim && m.sifre === sifre){
      const silBtn = document.createElement("button");
      silBtn.className = "silBtn";
      silBtn.textContent = "❌";
      silBtn.dataset.id = m.id;
      silBtn.addEventListener("click", () => silMesaj(m.id, div));
      div.appendChild(silBtn);
    }

    chat.appendChild(div);
    sonMesajId = Math.max(sonMesajId, m.id);
  });

  if(yeniMesajlar.length > 0) chat.scrollTop = chat.scrollHeight;
}

// Mesaj silme
function silMesaj(id, div) {
  client.from("mesajlar").delete().eq("id", id)
    .then(() => { div.remove(); })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
