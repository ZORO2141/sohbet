<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supabase Sohbet</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
body{background:#1e1e1e;color:white;font-family:Arial;text-align:center;margin:0;padding:0;}
h2{padding:15px;margin:0;background:#111;}
#chat{width:90%;max-width:700px;height:420px;margin:20px auto;background:#111;border:1px solid #333;overflow-y:auto;padding:15px;text-align:left;border-radius:10px;}
.mesaj{margin:10px 0;padding:8px;background:#222;border-radius:8px;word-wrap:break-word;position:relative;}
.mesaj b{color:#4da6ff;}
img{max-width:200px;border-radius:8px;margin-top:5px;display:block;}
input{width:65%;padding:10px;font-size:16px;border-radius:8px;border:none;}
button{padding:8px 12px;font-size:14px;border:none;border-radius:8px;cursor:pointer;}
.gonderBtn{background:#4da6ff;color:white;}
.silBtn{ 
  background:#aa3333; 
  color:white; 
  margin-left:8px; 
  display:none; /* Başlangıçta gizli */ 
  position:absolute; 
  right:5px; 
  top:5px; 
  cursor:pointer;
}
.mesaj:hover .silBtn { 
  display:inline-block; /* Hover ile görünür */ 
}
a{color:#4da6ff; word-break: break-all;}
</style>
</head>

<body>

<h2>Supabase Sohbet</h2>

<div id="chat"></div>

<input id="mesaj" placeholder="Mesaj yaz">
<button class="gonderBtn" onclick="gonder()">Gönder</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 🔹 Supabase bağlantısı
const SUPABASE_URL = "https://pqplprtztvamamzidyqa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGxwcnR6dHZhbWFtemlkeXFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODg5NjAsImV4cCI6MjA4ODI2NDk2MH0.FZD-uGWZsEMqvl7lOktzUAjAtULUDtw6d2Gbuewx5i8";

// 🔹 Supabase istemcisini başlat
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });

let isim, chat, input;
let sonMesajId = 0; // Son eklenen mesaj id’si

document.addEventListener("DOMContentLoaded", async () => {
  isim = prompt("Adın nedir?") || "Misafir";

  chat = document.getElementById("chat");
  input = document.getElementById("mesaj");

  input.addEventListener("keypress", e => { if(e.key==="Enter") gonder(); });

  await mesajlariYukle();

  setInterval(mesajlariYukle, 2000);
});

// 🔹 Mesaj gönderme
function gonder() {
  const mesaj = input.value.trim();
  if(!mesaj) return;

  client.from("mesajlar").insert([{ isim, mesaj }])
    .then(() => input.value="")
    .catch(err => console.log(err));
}

// 🔹 Mesajları yükleme (sadece yeni mesajlar ekleniyor)
async function mesajlariYukle() {
  const { data, error } = await client.from("mesajlar").select("*").order("id",{ascending:true});
  if(error){ console.log(error); return; }

  let yeniMesajlar = data.filter(m => m.id > sonMesajId);
  yeniMesajlar.forEach(m=>{
    const div = document.createElement("div");
    div.className = "mesaj";
    let html = "<b>"+m.isim+":</b> ";
    if(m.mesaj.match(/\.(jpg|png|gif|webp)$/i)) html += "<img src='"+m.mesaj+"'>";
    else if(m.mesaj.startsWith("http")) html += "<a href='"+m.mesaj+"' target='_blank'>"+m.mesaj+"</a>";
    else html += m.mesaj;

    if(m.isim === isim) html += " <button class='silBtn' onclick='sil("+m.id+")'>❌</button>";
    div.innerHTML = html;
    chat.appendChild(div);

    sonMesajId = Math.max(sonMesajId, m.id);
  });

  if(yeniMesajlar.length > 0) chat.scrollTop = chat.scrollHeight;
}

// 🔹 Mesaj silme
function sil(id) {
  client.from("mesajlar").delete().eq("id", id)
    .then(() => {
      // Silinen mesaj DOM’dan kaldır
      const divlar = document.querySelectorAll(".mesaj");
      divlar.forEach(d => {
        if(d.innerHTML.includes(`onclick='sil(${id})'`)) d.remove();
      });
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
