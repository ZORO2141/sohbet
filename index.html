<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Tek seferlik Supabase tanımı
const SUPABASE_URL = "https://pqplprtztvamamzidyqa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGxwcnR6dHZhbWFtemlkeXFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODg5NjAsImV4cCI6MjA4ODI2NDk2MH0.FZD-uGWZsEMqvl7lOktzUAjAtULUDtw6d2Gbuewx5i8";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isim, chat, input;

document.addEventListener("DOMContentLoaded", async () => {
  isim = prompt("Adın nedir?") || "Misafir";

  chat = document.getElementById("chat");
  input = document.getElementById("mesaj");

  input.addEventListener("keypress", e => { if(e.key==="Enter") gonder(); });

  await mesajlariYukle();
  setInterval(mesajlariYukle, 2000);
});

// Global fonksiyonlar
async function gonder() {
  let mesaj = input.value.trim();
  if(!mesaj) return;
  await supabase.from("mesajlar").insert([{ isim, mesaj }]);
  input.value = "";
  await mesajlariYukle();
}

async function mesajlariYukle() {
  chat.innerHTML = "";
  let { data, error } = await supabase.from("mesajlar").select("*").order("created_at",{ascending:true});
  if(error){ console.log(error); return; }

  data.forEach(m=>{
    let div = document.createElement("div");
    div.className = "mesaj";
    let html = "<b>"+m.isim+":</b> ";
    if(m.mesaj.match(/\.(jpg|png|gif|webp)$/i)) html += "<img src='"+m.mesaj+"'>";
    else if(m.mesaj.startsWith("http")) html += "<a href='"+m.mesaj+"' target='_blank' style='color:#4da6ff'>"+m.mesaj+"</a>";
    else html += m.mesaj;

    if(m.isim === isim) html += " <button class='silBtn' onclick='sil("+m.id+")'>❌</button>";
    div.innerHTML = html;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

async function sil(id){
  await supabase.from("mesajlar").delete().eq("id", id);
  await mesajlariYukle();
}
</script>
