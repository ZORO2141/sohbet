<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sohbet</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:0;
}

h2{
    padding:15px;
    margin:0;
    background:#111;
}

#chat{
    width:90%;
    max-width:700px;
    height:420px;
    margin:20px auto;
    background:#111;
    border:1px solid #333;
    overflow-y:auto;
    padding:15px;
    text-align:left;
    border-radius:10px;
}

.mesaj{
    margin:10px 0;
    padding:8px;
    background:#222;
    border-radius:8px;
    word-wrap:break-word;
}

.mesaj b{
    color:#4da6ff;
}

img{
    max-width:200px;
    border-radius:8px;
    margin-top:5px;
    display:block;
}

input{
    width:65%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
}

button{
    padding:8px 12px;
    font-size:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.gonderBtn{
    background:#4da6ff;
    color:white;
}

.silBtn{
    background:#aa3333;
    color:white;
    margin-left:8px;
}

.silBtn:hover{
    background:#ff4444;
}
</style>
</head>

<body>

<h2>Supabase Sohbet</h2>

<div id="chat"></div>

<input id="mesaj" placeholder="Mesaj yaz">
<button class="gonderBtn" onclick="gonder()">Gönder</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "BURAYA_URL";
const SUPABASE_ANON_KEY = "BURAYA_ANON_PUBLIC_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isim = prompt("Adın nedir?");
if(!isim) isim = "Misafir";

const input = document.getElementById("mesaj");
const chat = document.getElementById("chat");

input.addEventListener("keypress", function(e){
    if(e.key==="Enter") gonder();
});

// Mesaj gönder
async function gonder(){
    const mesaj = input.value.trim();
    if(!mesaj) return;

    await supabase.from("mesajlar").insert([{ isim, mesaj }]);
    input.value="";
    await mesajlariYukle();
}

// Mesajları yükle
async function mesajlariYukle(){
    chat.innerHTML="";

    const { data, error } = await supabase
        .from("mesajlar")
        .select("*")
        .order("created_at", { ascending: true });

    if(error){
        console.log(error);
        return;
    }

    data.forEach(m => {
        const div = document.createElement("div");
        div.className = "mesaj";

        let html = `<b>${m.isim}:</b> `;

        if(m.mesaj.match(/\.(jpg|png|gif|webp)$/i)){
            html += `<img src="${m.mesaj}">`;
        }
        else if(m.mesaj.startsWith("http")){
            html += `<a href="${m.mesaj}" target="_blank" style="color:#4da6ff">${m.mesaj}</a>`;
        }
        else{
            html += m.mesaj;
        }

        if(m.isim === isim){
            html += ` <button class="silBtn" onclick="sil(${m.id})">❌</button>`;
        }

        div.innerHTML = html;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

// Mesaj sil
async function sil(id){
    await supabase.from("mesajlar").delete().eq("id", id);
    await mesajlariYukle();
}

// Sayfa açılınca mesajları yükle
mesajlariYukle();

window.gonder = gonder;
window.sil = sil;
</script>

</body>
</html>
